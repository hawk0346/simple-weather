services:
  voicevox-engine:
    image: voicevox/voicevox_engine:cpu-latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:50021:50021"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:50021/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
